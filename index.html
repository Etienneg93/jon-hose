<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jon Hose — Beat 'em Up</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="stage">
    <!-- The game renders here at a fixed logical resolution, scaled up by CSS. -->
    <canvas id="game" width="480" height="270"></canvas>

    <!-- All UI overlays live on top of the canvas and are toggled via .hidden -->
    <div id="ui">

      <!-- TITLE -->
      <section id="screen-title" class="overlay">
        <h1 class="logo">JON&nbsp;HOSE</h1>
        <p class="tagline">Spray first. Ask questions never.</p>
        <div class="menu">
          <button class="btn" data-action="start">PRESS START</button>
        </div>
        <div class="audio-ctl">
          <div class="audio-row">
            <button class="mute-btn" data-mute aria-label="Mute music">🔊</button>
            <span class="vol-label">Music</span>
            <input type="range" class="vol-slider" min="0" max="100" value="50" data-vol aria-label="Music volume" />
            <span class="vol-pct" data-volpct>50%</span>
          </div>
          <div class="audio-row">
            <span class="mute-spacer"></span>
            <span class="vol-label">Sound Effects</span>
            <input type="range" class="vol-slider" min="0" max="100" value="100" data-sfxvol aria-label="Sound effects volume" />
            <span class="vol-pct" data-sfxpct>100%</span>
          </div>
        </div>
        <p class="hint">Move: WASD / Arrows &nbsp;·&nbsp; Spray: J / Space &nbsp;·&nbsp; Dash: Shift / L &nbsp;·&nbsp; Shop: E</p>
      </section>

      <!-- HUD (during play) -->
      <section id="hud" class="hidden">

        <div class="hud-row hud-left">
          <span id="hud-lv">LV 0</span>
          <div id="hud-xp"><div id="hud-xp-fill"></div></div>
        </div>
        <div class="hud-row hud-right">
          <span class="suds"><span class="suds-coin"></span><span id="hud-suds">0</span></span>
          <span class="wave"><span class="wave-label hidden" id="hud-wave-label">Last Wave cleared: </span><span id="hud-wave">Hosetown</span></span>
        </div>
        <div id="banner" class="banner hidden"></div>
      </section>

      <!-- SHOP (opened by walking up to the vendor) -->
      <section id="screen-shop" class="overlay hidden">
        <h2>OLD&nbsp;SPIGOT'S&nbsp;DEPOT</h2>
        <p class="shop-suds">💧 Suds: <span id="shop-suds">0</span></p>
        <div id="shop-list" class="shop-list"><!-- skill tree populated by game.js --></div>
        <button class="btn" data-action="resume">BACK TO THE STREET ▶</button>
      </section>

      <!-- GAME OVER -->
      <section id="screen-over" class="overlay hidden">
        <h2 class="over">GAME OVER</h2>
        <p id="over-stats" class="stats"></p>
        <button class="btn" data-action="retry">TRY AGAIN</button>
      </section>

      <!-- WIN -->
      <section id="screen-win" class="overlay hidden">
        <h2 class="win">YOU WIN!</h2>
        <p id="win-stats" class="stats"></p>
        <button class="btn" data-action="retry">PLAY AGAIN</button>
      </section>

      <!-- PAUSE -->
      <section id="screen-pause" class="overlay hidden">
        <h2>PAUSED</h2>
        <button class="btn" data-action="resume-pause">RESUME</button>
        <div class="audio-ctl">
          <div class="audio-row">
            <button class="mute-btn" data-mute aria-label="Mute music">🔊</button>
            <span class="vol-label">Music</span>
            <input type="range" class="vol-slider" min="0" max="100" value="50" data-vol aria-label="Music volume" />
            <span class="vol-pct" data-volpct>50%</span>
          </div>
          <div class="audio-row">
            <span class="mute-spacer"></span>
            <span class="vol-label">Sound Effects</span>
            <input type="range" class="vol-slider" min="0" max="100" value="100" data-sfxvol aria-label="Sound effects volume" />
            <span class="vol-pct" data-sfxpct>100%</span>
          </div>
        </div>
      </section>
    </div>
  </div>

  <div id="build-tag" class="build-tag">dev</div>

  <!-- Load order matters: namespace + config first, bootstrap last. -->
  <script src="js/loader.js"></script>
  <script src="js/config.js"></script>
  <script src="js/balance.js"></script>
  <script src="js/pillars.js"></script>
  <script src="js/mirror.js"></script>
  <script src="js/quake-frames.js"></script>
  <script src="js/neighbor-frames.js"></script>
  <script src="js/assets.js"></script>
  <script src="js/input.js"></script>
  <script src="js/world.js"></script>
  <script src="js/entities.js"></script>
  <script src="js/upgrades.js"></script>
  <script src="js/church.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
  <script>
    // Display the deployed build id (injected by tools/build.mjs); "dev" locally.
    (function () {
      var m = document.querySelector('meta[name="build"]');
      var v = document.querySelector('meta[name="ver"]');
      var el = document.getElementById("build-tag");
      if (el) el.textContent = (v ? "v" + v.content + " · " : "") + (m ? m.content : "dev");
    })();
  </script>
</body>
</html>
